<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tech Architect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Design System Foundations -->
  <link rel="stylesheet" href="./design-system/colors/colors.css">
  <link rel="stylesheet" href="./design-system/spacing/spacing.css">
  <link rel="stylesheet" href="./design-system/typography/typography.css">

  <!-- Design System Components -->
  <link rel="stylesheet" href="./design-system/components/button/button.css">
  <link rel="stylesheet" href="./design-system/components/boxes/boxes.css">
  <link rel="stylesheet" href="./design-system/components/tags/tags.css">
  <link rel="stylesheet" href="./design-system/components/modal/modal.css">

  <!-- Template + App CSS -->
  <link rel="stylesheet" href="./bespoke-template.css" />
  <link rel="stylesheet" href="./card-game.css" />
</head>
<body class="bespoke">
  <header class="header">
    <span class="app-title body-medium strong">Tech Architect</span>
    <span id="scenario-name" class="scenario-title"></span>
    <button id="btn-scenario-info" class="scenario-info-btn" title="Scenario details">i</button>

    <div class="spacer"></div>

    <div id="metrics-bar" class="metrics-bar"></div>

    <button id="btn-synergy" class="synergy-btn" data-count="0" title="Active synergies">⚡ 0</button>

    <div class="resource-bar">
      <span class="resource-icon">⬡</span>
      <div class="resource-track">
        <div id="resource-fill" class="resource-fill"></div>
      </div>
      <span id="resource-text" class="resource-text">0/0</span>
    </div>

    <button id="btn-help" class="button button-text">Help</button>
  </header>

  <div id="campaign-progress" class="campaign-progress" style="display:none"></div>

  <main class="game-layout">
    <!-- Board: grid of slots + synergy panel -->
    <div class="board-area">
      <div id="board" class="board">
        <div id="board-slots" class="board-slots"></div>
      </div>
      <div id="synergy-panel" class="synergy-panel"></div>
      <div id="victory-banner" class="victory-banner" style="display:none"></div>
    </div>

    <!-- Last deploy feedback -->
    <div id="last-attempt" class="last-attempt" style="display:none"></div>

    <!-- Hand: available cards + deploy -->
    <div class="hand-area">
      <!-- Cosmo mascot sitting on the fence -->
      <div class="cosmo-fence" aria-hidden="true">
        <img src="./cosmo/torso-happy.svg" alt="" class="cosmo-fence-img">
      </div>
      <div class="hand-header">
        <div id="filter-bar" class="filter-bar"></div>
        <button id="btn-deploy" class="deploy-btn" disabled>
          <span class="deploy-btn-icon">🚀</span> Deploy
        </button>
      </div>
      <div id="hand-cards" class="hand-cards"></div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
